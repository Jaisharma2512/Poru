name: Build & Deploy

on:
  push:
    branches:
      - master   # change to main if needed
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. mar-20)'
        required: true
        default: 'latest'

jobs:
  # ── Job 1: Build & push image on every push ──────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=$(date +'%b-%d' | tr '[:upper:]' '[:lower:]')-$(echo $GITHUB_SHA | cut -c1-6)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest

  # ── Job 2: Deploy to Hetzner — ONLY when manually triggered ──────────────
  deploy:
    name: Deploy to Hetzner VM
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
            docker stop ${{ secrets.CONTAINER_NAME }} || true
            docker rm ${{ secrets.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ secrets.CONTAINER_NAME }} \
              --restart always \
              -p ${{ secrets.CONTAINER_PORT }}:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
