name: Build & Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        default: 'latest'

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Note: Replace 'poru-app' with your actual repo name if it's different
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Hetzner
    runs-on: self-hosted  # Runs on your VM as 'jai'
    needs: build
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Update Target Container Only
        run: |
          # 1. Pull the new version
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest
          
          # 2. Safety Check: Only stop the container if the NAME matches your secret.
          # Based on your image, ensure CONTAINER_NAME is NOT 'pf-game' or 'smallboy-server-1'
          docker stop ${{ secrets.CONTAINER_NAME }} || true
          docker rm ${{ secrets.CONTAINER_NAME }} || true
          
          # 3. Start the new project on a fresh port
          # Use a port NOT in your image (Avoid 8080, 8081, 8083, 3002, 5000)
          docker run -d \
            --name ${{ secrets.CONTAINER_NAME }} \
            --restart always \
            -p ${{ secrets.CONTAINER_PORT }}:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest
          
          # 4. Clean up dangled images (doesn't touch running ones)
          docker image prune -f